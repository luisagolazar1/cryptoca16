    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="192" height="192" fill="url(#grad)"/>
  
  <!-- Círculos de Bitcoin -->
  <circle cx="96" cy="96" r="67.19999999999999" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="5.76"/>
  <circle cx="96" cy="96" r="53.760000000000005" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3.84"/>
  <circle cx="96" cy="96" r="40.32" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.88"/>
  
  <!-- Bitcoin Symbol -->
