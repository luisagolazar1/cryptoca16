<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="512" height="512" fill="url(#grad)"/>
  
  <!-- Círculos de Bitcoin -->
  <circle cx="256" cy="256" r="179.2" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="15.36"/>
  <circle cx="256" cy="256" r="143.36" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="10.24"/>
  <circle cx="256" cy="256" r="107.52" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="7.68"/>
  
  <!-- Bitcoin Symbol -->
  <g transform="translate(256,256)">
    <!-- ₿ symbol -->
    <text x="0" y="0" font-size="256" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif">₿</text>
  </g>
</svg>